name: Formula CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  formula-check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve formula version
        id: version
        run: |
          VERSION="$(ruby -e 'text = File.read("Formula/skytest.rb"); m = text.match(/version\s+"([^"]+)"/); puts(m ? m[1] : "")')"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not parse formula version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Skip placeholder formula
        if: ${{ steps.version.outputs.version == '0.0.0' }}
        run: echo "Placeholder formula version detected; skipping install/audit checks."

      - name: Brew audit
        if: ${{ steps.version.outputs.version != '0.0.0' }}
        run: brew audit --strict --online --formula skytest

      - name: Brew install
        if: ${{ steps.version.outputs.version != '0.0.0' }}
        run: brew install --formula ./Formula/skytest.rb

      - name: Smoke test
        if: ${{ steps.version.outputs.version != '0.0.0' }}
        run: skytest version
